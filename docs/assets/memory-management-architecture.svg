<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Wuwe Memory Management Runtime Architecture</title>
  <desc id="desc">System architecture diagram with a central memory_context runtime, request path, durable store, optional semantic index, and governance controls.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .ink { fill: #142033; font-family: "Segoe UI", Arial, sans-serif; }
      .muted { fill: #647086; font-family: "Segoe UI", Arial, sans-serif; }
      .tiny { fill: #718096; font-family: "Segoe UI", Arial, sans-serif; font-size: 12px; }
      .label { fill: #172033; font-family: "Segoe UI", Arial, sans-serif; font-size: 17px; font-weight: 720; }
      .label-lg { fill: #10203c; font-family: "Segoe UI", Arial, sans-serif; font-size: 26px; font-weight: 780; }
      .small { fill: #4f5d72; font-family: "Segoe UI", Arial, sans-serif; font-size: 13.5px; }
      .code { fill: #2b3446; font-family: Consolas, "Courier New", monospace; font-size: 13px; }
      .code-sm { fill: #2b3446; font-family: Consolas, "Courier New", monospace; font-size: 12px; }
      .verb { fill: #31415b; font-family: "Segoe UI", Arial, sans-serif; font-size: 12px; font-weight: 720; }
      .title { fill: #142033; font-family: "Segoe UI", Arial, sans-serif; font-size: 30px; font-weight: 760; }
      .shell { fill: #ffffff; stroke: #d8dfeb; stroke-width: 1.5; }
      .runtime { fill: #edf4ff; stroke: #2e6cdf; stroke-width: 3; }
      .runtime-core { fill: #ffffff; stroke: #2e6cdf; stroke-width: 2.4; }
      .store { fill: #ecf9f1; stroke: #2c9b60; stroke-width: 2.4; }
      .index { fill: #f6f1ff; stroke: #9172d6; stroke-width: 2; }
      .control { fill: #fff3f3; stroke: #dc7474; stroke-width: 1.8; }
      .output { fill: #fff7e7; stroke: #d89122; stroke-width: 2.4; }
      .subtle { fill: #f3f5f9; stroke: #cfd7e6; stroke-width: 1.4; }
      .main-arrow { stroke: #2e6cdf; stroke-width: 5; fill: none; marker-end: url(#arrow-main); }
      .store-arrow { stroke: #2c9b60; stroke-width: 3.5; fill: none; marker-end: url(#arrow-store); }
      .index-arrow { stroke: #9172d6; stroke-width: 2.6; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow-index); }
      .control-line { stroke: #dc7474; stroke-width: 2; fill: none; marker-end: url(#arrow-control); }
      .thin { stroke: #93a0b5; stroke-width: 1.8; fill: none; marker-end: url(#arrow-thin); }
      .inner-arrow { stroke: #7f8ca3; stroke-width: 1.6; fill: none; marker-end: url(#arrow-thin); }
    </style>
    <marker id="arrow-main" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2e6cdf"/>
    </marker>
    <marker id="arrow-store" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2c9b60"/>
    </marker>
    <marker id="arrow-index" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#9172d6"/>
    </marker>
    <marker id="arrow-control" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#dc7474"/>
    </marker>
    <marker id="arrow-thin" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#93a0b5"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#1f2a44" flood-opacity=".12"/>
    </filter>
  </defs>

  <rect class="bg" width="1440" height="820"/>
  <text class="title" x="72" y="60">Wuwe Memory Management Runtime</text>

  <rect class="shell" x="64" y="110" width="1312" height="520" rx="24"/>

  <rect class="subtle" x="98" y="170" width="210" height="120" rx="16"/>
  <text class="label" x="130" y="212">Application</text>
  <text class="small" x="130" y="241">Agent Runner</text>
  <text class="small" x="130" y="264">Memory Tools</text>

  <rect class="runtime" x="420" y="142" width="500" height="250" rx="24" filter="url(#shadow)"/>
  <text class="label-lg" x="462" y="188">memory_context</text>
  <text class="small" x="464" y="219">runtime facade for memory lifecycle and request augmentation</text>

  <rect class="runtime-core" x="462" y="252" width="124" height="72" rx="14"/>
  <text class="label" x="490" y="283">Recall</text>
  <text class="code" x="490" y="306">search</text>

  <rect class="runtime-core" x="616" y="252" width="172" height="72" rx="14"/>
  <text class="label" x="644" y="283">Ranker</text>
  <text class="code" x="644" y="306">lexical · hybrid</text>

  <rect class="runtime-core" x="818" y="252" width="92" height="72" rx="14"/>
  <text class="label" x="834" y="283">Inject</text>
  <text class="code" x="834" y="306">augment</text>

  <path class="inner-arrow" d="M586 288 L608 288"/>
  <path class="inner-arrow" d="M788 288 L810 288"/>

  <rect class="runtime-core" x="462" y="346" width="448" height="28" rx="14"/>
  <text class="code-sm" x="486" y="365">lifecycle: remember · update · erase · clear · rebuild</text>

  <rect class="output" x="1046" y="170" width="224" height="120" rx="16" filter="url(#shadow)"/>
  <text class="label" x="1080" y="212">LLM Request</text>
  <text class="small" x="1080" y="241">Relevant memory block</text>
  <text class="small" x="1080" y="264">budgeted injection</text>

  <path class="main-arrow" d="M308 230 L410 230"/>
  <text class="verb" x="348" y="222">calls</text>
  <path class="main-arrow" d="M920 230 L1036 230"/>
  <text class="verb" x="961" y="222">injects</text>

  <rect class="store" x="420" y="474" width="500" height="112" rx="18" filter="url(#shadow)"/>
  <text class="label" x="462" y="516">Authoritative Memory Store</text>
  <text class="small" x="462" y="545">complete memory_record: content, scope, metadata, timestamps</text>
  <text class="code" x="462" y="570">in_memory_store · file_memory_store · sqlite_memory_store</text>

  <path class="store-arrow" d="M640 392 L640 464"/>
  <text class="verb" x="610" y="436">persists</text>
  <path class="store-arrow" d="M704 474 L704 402"/>
  <text class="verb" x="729" y="436">recalls</text>

  <rect class="index" x="998" y="410" width="272" height="176" rx="18"/>
  <text class="label" x="1034" y="454">Semantic Index</text>
  <text class="small" x="1034" y="483">embedding_model</text>
  <text class="small" x="1034" y="506">vector_memory_index</text>
  <text class="code" x="1034" y="536">Qdrant: memory_id + vector</text>
  <text class="tiny" x="1034" y="562">filter payload, not source content</text>

  <path class="index-arrow" d="M878 318 C962 332, 1048 350, 1108 402"/>
  <text class="verb" x="979" y="358">indexes</text>
  <path class="index-arrow" d="M998 518 C944 520, 902 494, 878 342"/>
  <text class="verb" x="919" y="508">matches</text>

  <rect class="control" x="106" y="410" width="242" height="176" rx="18"/>
  <text class="label" x="140" y="454">Governance</text>
  <text class="small" x="140" y="483">privacy_filter</text>
  <text class="small" x="140" y="506">audit_sink</text>
  <text class="small" x="140" y="529">memory_policy</text>
  <text class="code" x="140" y="559">scope · TTL · PII</text>

  <path class="control-line" d="M348 492 C390 426, 428 376, 462 324"/>
  <text class="verb" x="399" y="426">guards</text>

  <rect class="shell" x="64" y="680" width="1312" height="82" rx="20"/>
  <rect class="subtle" x="104" y="704" width="258" height="34" rx="17"/>
  <text class="code" x="128" y="726">remember_long_term()</text>
  <rect class="subtle" x="392" y="704" width="210" height="34" rx="17"/>
  <text class="code" x="416" y="726">recall(query)</text>
  <rect class="subtle" x="632" y="704" width="218" height="34" rx="17"/>
  <text class="code" x="656" y="726">augment(request)</text>
  <rect class="subtle" x="880" y="704" width="246" height="34" rx="17"/>
  <text class="code" x="904" y="726">rebuild_vector_index()</text>
  <rect class="subtle" x="1156" y="704" width="176" height="34" rx="17"/>
  <text class="code" x="1180" y="726">compact_expired()</text>

  <path class="thin" d="M232 704 C342 640, 464 510, 552 374"/>
  <text class="verb" x="350" y="618">writes</text>
  <path class="thin" d="M497 704 C512 636, 520 448, 524 324"/>
  <text class="verb" x="516" y="590">recalls</text>
  <path class="thin" d="M741 704 C778 640, 820 506, 848 324"/>
  <text class="verb" x="796" y="596">assembles</text>
  <path class="thin" d="M1002 704 C1040 650, 1090 610, 1128 586"/>
  <text class="verb" x="1060" y="654">rebuilds</text>
  <path class="thin" d="M1244 704 C1162 648, 1028 608, 892 586"/>
  <text class="verb" x="1160" y="638">cleans</text>
</svg>

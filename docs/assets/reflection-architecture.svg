<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Wuwe Reflection Runtime Architecture</title>
  <desc id="desc">Architecture diagram for Wuwe Reflection runtime.</desc>
  <style>
    .bg { fill: #f7f8fb; }
    .title { fill: #172033; font: 700 34px Arial, sans-serif; }
    .subtitle { fill: #5a6478; font: 16px Arial, sans-serif; }
    .lane { fill: #ffffff; stroke: #d8deea; stroke-width: 2; rx: 20; }
    .lane-title { fill: #263149; font: 700 18px Arial, sans-serif; }
    .box { fill: #ffffff; stroke: #c5cee0; stroke-width: 2; rx: 14; }
    .input { fill: #eef5ff; stroke: #7ba7e8; }
    .runtime { fill: #f1fbf5; stroke: #7cc795; }
    .policy { fill: #fff7e8; stroke: #e2aa47; }
    .action { fill: #f5efff; stroke: #a282db; }
    .label { fill: #1e293b; font: 700 15px Arial, sans-serif; }
    .small { fill: #536078; font: 13px Arial, sans-serif; }
    .arrow { stroke: #7b8498; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7b8498"/>
    </marker>
  </defs>
  <rect class="bg" width="1440" height="820"/>
  <text x="72" y="62" class="title">Wuwe Reflection Runtime</text>
  <text x="72" y="91" class="subtitle">Quality evaluation for outputs, steps, tools, RAG answers, and final responses.</text>

  <rect x="60" y="126" width="300" height="580" class="lane"/>
  <text x="86" y="166" class="lane-title">Subjects</text>
  <rect x="88" y="194" width="244" height="78" class="input"/>
  <text x="112" y="224" class="label">Candidate Output</text>
  <text x="112" y="248" class="small">Answer, tool result, step output</text>
  <rect x="88" y="304" width="244" height="78" class="input"/>
  <text x="112" y="334" class="label">Original Context</text>
  <text x="112" y="358" class="small">Task, input, evidence, metadata</text>
  <rect x="88" y="414" width="244" height="78" class="input"/>
  <text x="112" y="444" class="label">Rubric</text>
  <text x="112" y="468" class="small">Criteria, threshold, required checks</text>
  <rect x="88" y="524" width="244" height="78" class="input"/>
  <text x="112" y="554" class="label">Reflection Request</text>
  <text x="112" y="578" class="small">Normalized evaluation envelope</text>

  <rect x="410" y="126" width="330" height="580" class="lane"/>
  <text x="436" y="166" class="lane-title">Evaluation</text>
  <rect x="442" y="194" width="266" height="78" class="runtime"/>
  <text x="468" y="224" class="label">Reflection Runner</text>
  <text x="468" y="248" class="small">Runtime services and event emission</text>
  <rect x="442" y="304" width="266" height="78" class="runtime"/>
  <text x="468" y="334" class="label">Reflectors</text>
  <text x="468" y="358" class="small">Rule, LLM, composite evaluators</text>
  <rect x="442" y="414" width="266" height="78" class="policy"/>
  <text x="468" y="444" class="label">Result Merger</text>
  <text x="468" y="468" class="small">Issues, score, strongest action</text>
  <rect x="442" y="524" width="266" height="78" class="policy"/>
  <text x="468" y="554" class="label">Normalizer</text>
  <text x="468" y="578" class="small">Score bounds and consistency</text>

  <rect x="790" y="126" width="330" height="580" class="lane"/>
  <text x="816" y="166" class="lane-title">Decision</text>
  <rect x="822" y="204" width="266" height="84" class="policy"/>
  <text x="848" y="236" class="label">Policy Engine</text>
  <text x="848" y="260" class="small">Maps quality to action</text>
  <rect x="822" y="326" width="266" height="84" class="action"/>
  <text x="848" y="358" class="label">Reflection Result</text>
  <text x="848" y="382" class="small">pass, revise, retry, replan, block</text>
  <rect x="822" y="448" width="266" height="84" class="action"/>
  <text x="848" y="480" class="label">Critique</text>
  <text x="848" y="504" class="small">Issues, evidence, suggestions</text>
  <rect x="822" y="570" width="266" height="84" class="action"/>
  <text x="848" y="602" class="label">Revision Payload</text>
  <text x="848" y="626" class="small">Optional corrected output</text>

  <rect x="1170" y="126" width="210" height="580" class="lane"/>
  <text x="1196" y="166" class="lane-title">Consumers</text>
  <rect x="1196" y="206" width="158" height="72" class="box"/>
  <text x="1218" y="236" class="label">Planning</text>
  <text x="1218" y="258" class="small">Step gate</text>
  <rect x="1196" y="316" width="158" height="72" class="box"/>
  <text x="1218" y="346" class="label">RAG</text>
  <text x="1218" y="368" class="small">Grounding checks</text>
  <rect x="1196" y="426" width="158" height="72" class="box"/>
  <text x="1218" y="456" class="label">Tool Use</text>
  <text x="1218" y="478" class="small">Result quality</text>
  <rect x="1196" y="536" width="158" height="72" class="runtime"/>
  <text x="1218" y="566" class="label">Stores</text>
  <text x="1218" y="588" class="small">History and trace</text>

  <path d="M210 272 L210 304" class="arrow"/>
  <path d="M210 382 L210 414" class="arrow"/>
  <path d="M210 492 L210 524" class="arrow"/>
  <path d="M332 563 C378 563 396 233 442 233" class="arrow"/>
  <path d="M575 272 L575 304" class="arrow"/>
  <path d="M575 382 L575 414" class="arrow"/>
  <path d="M575 492 L575 524" class="arrow"/>
  <path d="M708 563 C754 563 776 246 822 246" class="arrow"/>
  <path d="M955 288 L955 326" class="arrow"/>
  <path d="M955 410 L955 448" class="arrow"/>
  <path d="M955 532 L955 570" class="arrow"/>
  <path d="M1088 368 L1196 242" class="arrow"/>
  <path d="M1088 368 L1196 352" class="arrow"/>
  <path d="M1088 368 L1196 462" class="arrow"/>
  <path d="M1088 612 L1196 572" class="arrow"/>
</svg>
